<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Selene</title>
<script>
  // GitHub Pages SPA redirect: re-encode the path as a query string so
  // the root index.html can restore it via history.replaceState.
  // pathSegmentsToKeep=1 preserves the /lifehex/ repo prefix.
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 2).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body></body>
</html>
